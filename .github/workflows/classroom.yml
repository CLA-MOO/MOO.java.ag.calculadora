name: Autograding
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  run-autograding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: education/autograding@v1
        id: autograding
